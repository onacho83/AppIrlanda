services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-imprenta}
      POSTGRES_USER: ${DB_USER:-imprenta_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-imprenta_secret_2026}
    ports:
      - "5433:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-imprenta_user} -d ${DB_NAME:-imprenta}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-imprenta_user}:${DB_PASSWORD:-imprenta_secret_2026}@db:5432/${DB_NAME:-imprenta}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-30d}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-60d}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      ARCA_PRODUCTION: "false"
    ports:
      - "3001:3001"
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    networks:
      - app-network
    profiles:
      - tunnel  # Solo se activa con: docker compose --profile tunnel up

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
